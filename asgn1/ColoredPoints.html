<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Colored Points</title>
  </head>
  <body onload="main()">
    <canvas id="webgl" width="400" height="400">
      Please use a browser that supports "canvas".
    </canvas>
    <br />
    <button id="green">Green</button>
    <button id="red">Red</button>
    <button id="pointButton">Point</button>
    <button id="triangleButton">Triangle</button>
    <button id="circleButton">Circle</button>
    <button id="pictureButton">Draw Picture</button>
    <button id="mirrorButton">Mirror: Off</button>
    <button id="partyButton">Party Brush: Off</button>
    <button id="clearButton">Clear</button>
    <p>
      Red
      <input type="range" min="0" max="100" value="100" class="slider" id="redSlide" />
    </p>
    <p>
      Green
      <input type="range" min="0" max="100" value="100" class="slider" id="greenSlide" />
    </p>
    <p>
      Blue
      <input type="range" min="0" max="100" value="100" class="slider" id="blueSlide" />
    </p>
    <p>
      Size
      <input type="range" min="5" max="40" value="10" class="slider" id="sizeSlide" />
    </p>
    <p>
      Segments
      <input type="range" min="3" max="60" value="10" class="slider" id="segmentSlide" />
    </p>
    <p id="numdot">XXX</p>
    <p>
      Awesomeness feature: Mirror mode draws a mirrored shape so you can make symmetric art and party brush uses cycled colors and changes brush size while you draw to create a rainbow like effect.
    </p>
    <p>Reference drawing:</p>
    <img src="IMG_1500.jpg" alt="Reference sketch" width="320" />

    <script src="lib/webgl-utils.js"></script>
    <script src="lib/webgl-debug.js"></script>
    <script src="lib/cuon-utils.js"></script>
    <script src="Point.js"></script>
    <script src="Triangle.js"></script>
    <script src="Circle.js"></script>
    <script src="ColoredPoints.js"></script>
  </body>
</html>
